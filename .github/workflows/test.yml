name: Test Project
on:
  push:
    branches:
      - "main"
      - "master"

jobs:
  Build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 23, 24]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build Lib
        run: pnpm --filter comp-library build
      - name: Build App
        run: pnpm --filter svelte-graphql build
