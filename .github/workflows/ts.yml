name: Build
on:
  push:
    branches:
      - "main"
      - "master"
    paths:
      - "svelte-graphql/**"

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Lib
        run: pnpm --filter comp-library build

      - name: Build App
        run: pnpm --filter svelte-graphql build
