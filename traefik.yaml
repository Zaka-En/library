global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: DEBUG


api:
  dashboard: true
  insecure: true


entryPoints:
  web: 
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443
    http:
      tls: true
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    useBindPortIP: true
  
  file:
    filename: ./tls.yaml
    watch: true


 
  